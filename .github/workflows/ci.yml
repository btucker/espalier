name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Pick the newest Xcode on the runner. The image ships multiple; the
      # default is an older one whose bundled swift-testing (version 124.4)
      # hangs on exit after all tests pass — the summary line never prints
      # and the process blocks for ~10 minutes before a SIGKILL. Newer
      # swift-testing (1700+) doesn't repro. Fall back gracefully if the
      # glob finds nothing.
      - name: Select latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$latest" ]; then
            echo "Selecting $latest"
            sudo xcode-select -s "$latest/Contents/Developer"
          else
            echo "No Xcode_*.app found; using default xcode-select"
          fi

      - name: Show tool versions
        run: |
          xcode-select -p
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build app + tests (warnings as errors)
        run: swift build --build-tests -Xswiftc -warnings-as-errors

      - name: Test
        timeout-minutes: 5
        # `script` gives swift test a PTY-like stdout so output streams
        # in real time instead of being block-buffered by the CI log pipe.
        run: /usr/bin/script -q /dev/null swift test --skip-build
